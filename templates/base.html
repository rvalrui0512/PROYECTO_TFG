<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}TFG Flamenco{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="/">TFG Flamenco</a>
        <div class="navbar-nav">
            <a class="nav-link" href="{% url 'guitarra:user_list' %}">Usuarios</a>
            <a class="nav-link" href="{% url 'guitarra:video_list' %}">Videos</a>
            <a class="nav-link" href="{% url 'guitarra:guitarra_list' %}">Guitarras</a>
            <a class="nav-link" href="{% url 'guitarra:claseprivada_list' %}">Clases</a>
            <a class="nav-link" href="{% url 'guitarra:ia_busqueda' %}">IA</a>
        </div>
    </div>
</nav>

<main class="container pb-4">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-info">{{ message }}</div>
        {% endfor %}
    {% endif %}
    {% block content %}{% endblock %}
</main>
</body>
</html>
