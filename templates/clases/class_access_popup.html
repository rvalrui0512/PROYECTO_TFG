<div class="position-fixed top-0 start-0 w-100 h-100 d-flex align-items-center justify-content-center p-3" style="z-index: 1080; background: rgba(10, 15, 25, 0.32); backdrop-filter: blur(6px);">
  <div class="card border-0 shadow-lg rounded-4 overflow-hidden" style="width: min(92vw, 560px);">
    <div class="card-header {% if modal_variant == 'danger' %}bg-danger{% else %}bg-warning{% endif %} text-white border-0 d-flex align-items-center gap-3 py-3 px-4">
      <span class="rounded-circle d-inline-flex align-items-center justify-content-center bg-white bg-opacity-25" style="width: 2rem; height: 2rem; flex: 0 0 auto;">
        <i class="fa-solid fa-circle-info"></i>
      </span>
      <div class="flex-grow-1">
        <h5 class="mb-0 fw-semibold">{{ modal_title }}</h5>
      </div>
      <button type="button" class="btn-close btn-close-white" data-access-popup-close aria-label="Cerrar"></button>
    </div>
    <div class="card-body bg-white p-4 p-md-4">
      <p class="mb-4 text-dark fs-6 lh-base">{{ modal_message }}</p>
      <div class="d-flex flex-wrap gap-2 justify-content-center justify-content-md-end">
        <a href="{% url 'guitarra:claseprivada_list' %}" class="btn {% if modal_variant == 'danger' %}btn-danger{% else %}btn-warning{% endif %}">Volver a las clases</a>
        <a href="{% url 'guitarra:claseprivada_detail' clase.pk %}" class="btn btn-outline-secondary">Ver detalle</a>
        {% if modal_cta_url and modal_cta_label %}
          <a href="{{ modal_cta_url }}" class="btn btn-outline-primary">{{ modal_cta_label }}</a>
        {% endif %}
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('[data-access-popup-close]').forEach(function(button) {
    button.addEventListener('click', function() {
      var popup = this.closest('.position-fixed');
      if (popup) {
        popup.remove();
      }
    });
  });
});
</script>
