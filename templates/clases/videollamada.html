{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container mt-4">
    <div class="row justify-content-center">
        <div class="col-12 col-xl-10">
            <div class="card shadow-sm border-0">
                <div class="card-body p-4 p-md-5">
                    <div class="d-flex flex-column flex-md-row justify-content-between gap-3 align-items-md-center mb-3">
                        <div>
                            <p class="text-uppercase text-muted small mb-1">Clase privada</p>
                            <h2 class="mb-2">Videollamada de {{ clase.titulo }}</h2>
                            <p class="mb-0 text-muted">Sala privada embebida con Jitsi Meet. Solo pueden entrar los usuarios autorizados por Django.</p>
                        </div>
                        <a href="{% url 'guitarra:claseprivada_detail' clase.pk %}" class="btn btn-outline-secondary">Volver al detalle</a>
                    </div>

                    <div id="jitsi-status" class="alert alert-info mb-3" role="status">
                        Preparando la sala privada...
                    </div>

                    <div
                        id="jitsi-meet-container"
                        class="border rounded-4 overflow-hidden bg-dark"
                        style="min-height: 70vh; width: 100%;"
                        data-room-name="{{ jitsi_room_name }}"
                        data-display-name="{{ jitsi_display_name|default:user.get_username }}"
                        data-jitsi-domain="{{ jitsi_domain }}"
                        data-return-url="{{ return_url }}"
                    ></div>

                    <noscript>
                        <div class="alert alert-warning mt-3 mb-0">
                            Necesitas activar JavaScript para cargar la videollamada embebida.
                        </div>
                    </noscript>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="{{ jitsi_api_url }}" defer></script>
<script src="{% static 'clases/jitsi_meet.js' %}" defer></script>
{% endblock %}
