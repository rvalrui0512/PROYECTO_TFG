{% extends 'base.html' %}
{% block title %}Tienda de Guitarras{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3">Tienda de Guitarras</h1>
    <a class="btn btn-primary" href="{% url 'guitarra:guitarra_create' %}">Nueva guitarra</a>
</div>
<ul class="list-group">
    {% for g in guitarras %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            <a href="{% url 'guitarra:guitarra_detail' g.pk %}">{{ g.marca }} {{ g.modelo }}</a>
            <div>
                <a class="btn btn-sm btn-outline-secondary" href="{% url 'guitarra:guitarra_update' g.pk %}">Editar</a>
                <a class="btn btn-sm btn-outline-danger" href="{% url 'guitarra:guitarra_delete' g.pk %}">Eliminar</a>
            </div>
        </li>
    {% empty %}
        <li class="list-group-item">No hay guitarras.</li>
    {% endfor %}
</ul>
{% endblock %}
