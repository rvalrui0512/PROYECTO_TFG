{% extends 'base.html' %}
{% block title %}Eliminar clase privada{% endblock %}
{% block content %}
<h1 class="h3">Eliminar clase privada</h1>
<p>¿Seguro que quieres eliminar {{ object.titulo }}?</p>
<form method="post">
    {% csrf_token %}
    <button class="btn btn-danger" type="submit">Sí, eliminar</button>
    <a class="btn btn-secondary" href="{% url 'guitarra:claseprivada_list' %}">Cancelar</a>
</form>
{% endblock %}
