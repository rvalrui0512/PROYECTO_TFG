{% extends 'base.html' %}
{% block title %}Clases privadas{% endblock %}
{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3">Clases privadas</h1>
    <a class="btn btn-primary" href="{% url 'guitarra:claseprivada_create' %}">Nueva clase</a>
</div>
<ul class="list-group">
    {% for c in clases %}
        <li class="list-group-item d-flex justify-content-between align-items-center">
            <a href="{% url 'guitarra:claseprivada_detail' c.pk %}">{{ c.titulo }}</a>
            <div>
                <a class="btn btn-sm btn-outline-secondary" href="{% url 'guitarra:claseprivada_update' c.pk %}">Editar</a>
                <a class="btn btn-sm btn-outline-danger" href="{% url 'guitarra:claseprivada_delete' c.pk %}">Eliminar</a>
            </div>
        </li>
    {% empty %}
        <li class="list-group-item">No hay clases privadas.</li>
    {% endfor %}
</ul>
{% endblock %}
