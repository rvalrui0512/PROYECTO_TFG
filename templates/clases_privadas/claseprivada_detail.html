{% extends 'base.html' %}
{% block title %}Detalle clase{% endblock %}
{% block content %}
<h1 class="h3">{{ clase.titulo }}</h1>
<p>{{ clase.descripcion }}</p>
<p><strong>Profesor:</strong> {{ clase.profesor }}</p>
<p><strong>Alumno:</strong> {{ clase.alumno }}</p>
<p><strong>Inicio:</strong> {{ clase.fecha_inicio }}</p>
<p><strong>Fin:</strong> {{ clase.fecha_fin }}</p>
<a class="btn btn-secondary" href="{% url 'guitarra:claseprivada_list' %}">Volver</a>
{% endblock %}
