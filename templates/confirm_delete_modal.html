<!-- Modal de confirmación para eliminar -->
<div class="modal fade" id="confirmDeleteModal" tabindex="-1" aria-labelledby="confirmDeleteModalLabel" aria-hidden="true">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header bg-danger text-white">
        <h5 class="modal-title" id="confirmDeleteModalLabel"><i class="fa-solid fa-triangle-exclamation me-2"></i>Confirmar eliminación</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body">
        ¿Seguro que quieres eliminar <strong id="deleteTargetName">este elemento</strong>? Esta acción no se puede deshacer.
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <form id="confirmDeleteForm" method="post" action="#" class="d-inline">
          {% csrf_token %}
          <button type="submit" id="confirmDeleteBtn" class="btn btn-danger">Eliminar</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var deleteLinks = document.querySelectorAll('.btn-delete-dark, .btn-danger[href*="eliminar"], .btn-danger[href*="delete"]');
  var confirmDeleteModal = document.getElementById('confirmDeleteModal');
  var confirmDeleteForm = document.getElementById('confirmDeleteForm');
  var deleteTargetName = document.getElementById('deleteTargetName');
  var bsModal;

  deleteLinks.forEach(function(link) {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      var href = this.getAttribute('href');
      var label = this.getAttribute('data-delete-label') || 'este elemento';
      confirmDeleteForm.setAttribute('action', href);
      if (deleteTargetName) {
        deleteTargetName.textContent = label;
      }
      if (window.bootstrap) {
        bsModal = new bootstrap.Modal(confirmDeleteModal);
        bsModal.show();
      } else {
        confirmDeleteModal.style.display = 'block';
      }
    });
  });
});
</script>
